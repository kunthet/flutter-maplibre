name: maplibre_windows
description: "Windows native implementation of the Flutter MapLibre plugin using maplibre-native."
version: 0.3.5
repository: https://github.com/josxha/flutter-maplibre
issue_tracker: https://github.com/josxha/flutter-maplibre/issues
homepage: https://flutter-maplibre.pages.dev
documentation: https://flutter-maplibre.pages.dev/docs/

platforms: { windows: }

environment:
  sdk: '>=3.10.0 <4.0.0'
  flutter: '>=3.38.0'

resolution: workspace

dependencies:
  flutter: { sdk: flutter }
  maplibre_platform_interface: ^0.3.5

dev_dependencies:
  flutter_test: { sdk: flutter }
  very_good_analysis: ^10.0.0

flutter:
  plugin:
    implements: maplibre
    platforms:
      windows:
        dartPluginClass: MapLibrePlugin
        dartFileName: 'src/maplibre_plugin.dart'
        pluginClass: MaplibreWindowsPlugin
